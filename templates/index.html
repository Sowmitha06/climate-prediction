<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ClimateRisk — AI Prediction System</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet" />

<style>

:root {
  --bg:        #050c14;
  --panel:     #080f1a;
  --border:    #0d2035;
  --accent:    #00c8ff;
  --accent2:   #00ff9d;
  --danger:    #ff4757;
  --warn:      #ffa502;
  --text:      #c8e0f0;
  --muted:     #3a5a72;
  --glow:      0 0 12px rgba(0,200,255,.45);
  --glow-g:    0 0 12px rgba(0,255,157,.45);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Rajdhani', sans-serif;
  font-size: 15px;
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,200,255,.018) 2px,
    rgba(0,200,255,.018) 4px
  );
  pointer-events: none;
  z-index: 1000;
}

.wrapper {
  max-width: 1300px;
  margin: 0 auto;
  padding: 0 28px 60px;
}

header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 22px 0 18px;
  border-bottom: 1px solid var(--border);
  position: relative;
}

.logo {
  font-family: 'Orbitron', monospace;
  font-weight: 900;
  font-size: 2.2rem;
  letter-spacing: 2px;
  color: #fff;
}
.logo span { color: var(--accent); }

.status-pill {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'Share Tech Mono', monospace;
  font-size: .78rem;
  color: var(--muted);
  background: #0a1625;
  border: 1px solid var(--border);
  padding: 6px 14px;
  border-radius: 3px;
}
.dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--muted);
  transition: background .4s, box-shadow .4s;
}
.dot.training { background: var(--warn);  box-shadow: 0 0 8px var(--warn); animation: pulse 1.2s infinite; }
.dot.ready    { background: var(--accent2); box-shadow: var(--glow-g); }
.dot.error    { background: var(--danger);  box-shadow: 0 0 8px var(--danger); }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

.accuracy-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin: 22px 0;
}

.acc-card {
  background: var(--panel);
  border: 1px solid var(--border);
  padding: 18px 22px;
  position: relative;
  overflow: hidden;
}
.acc-card::after {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px; height: 100%;
  background: var(--accent);
}
.acc-card.rnn::after { background: var(--warn); }

.acc-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: .72rem;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.acc-value {
  font-family: 'Orbitron', monospace;
  font-size: 2rem;
  font-weight: 700;
  color: var(--accent);
}
.acc-card.rnn .acc-value { color: var(--warn); }

.acc-bar-track {
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin-top: 10px;
  overflow: hidden;
}
.acc-bar-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  width: 0%;
  transition: width 1.2s cubic-bezier(.22,1,.36,1);
}
.acc-card.rnn .acc-bar-fill { background: var(--warn); }

.acc-skeleton {
  height: 2rem;
  background: linear-gradient(90deg, var(--border) 25%, #0d2a40 50%, var(--border) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: 3px;
}
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

.section-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: .72rem;
  letter-spacing: 3px;
  color: var(--accent);
  text-transform: uppercase;
  margin: 26px 0 14px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.input-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
}

@media (max-width: 900px) { .input-grid { grid-template-columns: repeat(2,1fr); } }
@media (max-width: 520px) { .input-grid { grid-template-columns: 1fr; } }

.field {
  display: flex;
  flex-direction: column;
  gap: 0;
}

.field label {
  font-family: 'Share Tech Mono', monospace;
  font-size: .68rem;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 6px;
}

.field input {
  background: #08131e;
  border: 1px solid var(--border);
  color: #fff;
  font-family: 'Orbitron', monospace;
  font-size: 1.1rem;
  font-weight: 400;
  padding: 12px 14px;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.field input:focus {
  border-color: var(--accent);
  box-shadow: var(--glow), inset 0 0 20px rgba(0,200,255,.04);
}

.unit-tag {
  font-family: 'Share Tech Mono', monospace;
  font-size: .66rem;
  color: var(--muted);
  margin-top: 4px;
}

.btn-predict {
  margin-top: 22px;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-family: 'Orbitron', monospace;
  font-size: .85rem;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--bg);
  background: var(--accent);
  border: none;
  padding: 14px 32px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: transform .15s, box-shadow .15s;
  clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
}
.btn-predict:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 28px rgba(0,200,255,.5);
}
.btn-predict:active { transform: translateY(0); }
.btn-predict:disabled {
  background: var(--muted);
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}
.btn-predict .spinner {
  width: 14px; height: 14px;
  border: 2px solid rgba(0,0,0,.3);
  border-top-color: #000;
  border-radius: 50%;
  display: none;
  animation: spin .7s linear infinite;
}
.btn-predict.loading .spinner { display: block; }
@keyframes spin { to { transform: rotate(360deg); } }

.output-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 16px;
  margin-top: 8px;
  max-width: 700px;
}

@media (max-width: 640px) { .output-grid { grid-template-columns: 1fr; } }

.result-card {
  background: var(--panel);
  border: 1px solid var(--border);
  padding: 22px 24px 18px;
  position: relative;
  overflow: hidden;
  transition: border-color .3s;
}
.result-card.active { border-color: var(--accent); box-shadow: var(--glow); }
.result-card.active.rnn-card { border-color: var(--warn); box-shadow: 0 0 14px rgba(255,165,2,.35); }

.result-card::before {
  content: attr(data-model);
  position: absolute;
  top: 14px; right: 14px;
  font-family: 'Share Tech Mono', monospace;
  font-size: .65rem;
  letter-spacing: 2px;
  color: var(--muted);
}

.result-category {
  font-family: 'Orbitron', monospace;
  font-size: 1.7rem;
  font-weight: 700;
  color: var(--accent);
  margin: 8px 0 4px;
  min-height: 2.2rem;
  transition: color .3s;
}
.rnn-card .result-category { color: var(--warn); }

.result-conf {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 300;
  font-size: .9rem;
  color: var(--muted);
}

.conf-value { color: var(--text); font-weight: 600; }

.badge-heatwave  { color: var(--danger); }
.badge-drought   { color: var(--warn);   }
.badge-flood     { color: #00b0ff;       }
.badge-storm     { color: #b966ff;       }
.badge-normal    { color: var(--accent2);}
.badge-cyclone   { color: #ff6b9d;       }
.badge-blizzard  { color: #a0d8ef;       }

.best-badge {
  display: inline-block;
  font-family: 'Share Tech Mono', monospace;
  font-size: .62rem;
  letter-spacing: 1.5px;
  color: var(--bg);
  background: var(--accent2);
  padding: 2px 8px;
  margin-top: 8px;
  border-radius: 2px;
  text-transform: uppercase;
  opacity: 0;
  transition: opacity .4s;
}
.best-badge.show { opacity: 1; }

.corner {
  position: absolute;
  width: 16px; height: 16px;
  border-color: var(--accent);
  border-style: solid;
}
.corner-tl { top: 0; left: 0; border-width: 2px 0 0 2px; }
.corner-br { bottom: 0; right: 0; border-width: 0 2px 2px 0; }

footer {
  margin-top: 50px;
  border-top: 1px solid var(--border);
  padding-top: 16px;
  font-family: 'Share Tech Mono', monospace;
  font-size: .66rem;
  color: var(--muted);
  display: flex;
  justify-content: space-between;
}

#toast {
  position: fixed;
  bottom: 28px; right: 28px;
  background: #0b1e2e;
  border: 1px solid var(--accent);
  color: var(--text);
  font-family: 'Share Tech Mono', monospace;
  font-size: .75rem;
  padding: 12px 18px;
  border-radius: 3px;
  box-shadow: var(--glow);
  opacity: 0;
  transform: translateY(12px);
  transition: opacity .3s, transform .3s;
  z-index: 9999;
  max-width: 320px;
}
#toast.show { opacity: 1; transform: translateY(0); }
#toast.err  { border-color: var(--danger); box-shadow: 0 0 12px rgba(255,71,87,.4); }
</style>
</head>
<body>

<div class="wrapper">

  <header>
    <div class="logo">Climate<span>Risk</span></div>
    <div class="status-pill">
      <div class="dot" id="statusDot"></div>
      <span id="statusText">INITIALIZING</span>
    </div>
  </header>

 

  <div class="section-label">Enter Climate Data</div>

  <div class="input-grid">
    <div class="field">
      <label>Temperature</label>
      <input type="number" id="temperature" placeholder="45" step="0.1" />
      <span class="unit-tag">°C</span>
    </div>
    <div class="field">
      <label>Humidity</label>
      <input type="number" id="humidity" placeholder="40" step="0.1" />
      <span class="unit-tag">%</span>
    </div>
    <div class="field">
      <label>Pressure</label>
      <input type="number" id="pressure" placeholder="1015" step="0.1" />
      <span class="unit-tag">hPa</span>
    </div>
    <div class="field">
      <label>Wind Speed</label>
      <input type="number" id="wind_speed" placeholder="60" step="0.1" />
      <span class="unit-tag">m/s</span>
    </div>
    <div class="field">
      <label>Precipitation</label>
      <input type="number" id="precipitation" placeholder="18" step="0.1" />
      <span class="unit-tag">mm</span>
    </div>
    <div class="field">
      <label>Cloud Cover</label>
      <input type="number" id="cloud_cover" placeholder="50" step="0.1" />
      <span class="unit-tag">%</span>
    </div>
    <div class="field">
      <label>UV Index</label>
      <input type="number" id="uv_index" placeholder="7" step="0.1" />
      <span class="unit-tag">0 – 11+</span>
    </div>
  </div>

  <button class="btn-predict" id="predictBtn" onclick="predict()">
    <div class="spinner" id="btnSpinner"></div>
    PREDICT CLIMATE RISK
  </button>

  <div class="section-label" style="margin-top:32px">Prediction Output</div>

  <div class="output-grid">
    <div class="result-card" data-model="LSTM MODEL" id="lstmCard">
      <div class="corner corner-tl"></div>
      <div class="corner corner-br"></div>
      <div class="result-category" id="lstmLabel">—</div>
      <div class="result-conf">Confidence: <span class="conf-value" id="lstmConf">—</span></div>
      <div class="result-conf" style="margin-top:4px">Accuracy: <span class="conf-value" id="lstmAccOut">—</span></div>
      <span class="best-badge" id="lstmBest">★ BEST MODEL</span>
    </div>
    <div class="accuracy-row">
    <div class="acc-card">
      <div class="acc-label">LSTM Model Accuracy</div>
      <div class="acc-value" id="lstmAccVal">
        <div class="acc-skeleton" style="width:120px"></div>
      </div>
      <div class="acc-bar-track"><div class="acc-bar-fill" id="lstmBar"></div></div>
    </div>
    <div class="acc-card rnn">
      <div class="acc-label">RNN Model Accuracy</div>
      <div class="acc-value" id="rnnAccVal">
        <div class="acc-skeleton" style="width:120px"></div>
      </div>
      <div class="acc-bar-track"><div class="acc-bar-fill" id="rnnBar"></div></div>
    </div>
  </div>
  <footer>
    <h3>
    <span>CLIMATE RISK AI — RNN &amp; LSTM ENSEMBLE</span>
    <span id="footerTime"></span>
    </h3>
  </footer>

</div>

<div id="toast"></div>

<script>
const API = 'http://localhost:5000';

function showToast(msg, isErr = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show' + (isErr ? ' err' : '');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.className = '', 3500);
}

const RISK_CLASS = {
  heatwave: 'badge-heatwave',
  drought:  'badge-drought',
  flood:    'badge-flood',
  storm:    'badge-storm',
  normal:   'badge-normal',
  cyclone:  'badge-cyclone',
  blizzard: 'badge-blizzard',
};
function riskClass(label) {
  const key = label.toLowerCase();
  return RISK_CLASS[key] || '';
}

function updateClock() {
  document.getElementById('footerTime').textContent =
    new Date().toLocaleTimeString([], {hour12: false});
}
setInterval(updateClock, 1000);
updateClock();

let pollTimer = null;

async function checkStatus() {
  try {
    const res  = await fetch(`${API}/status`);
    const data = await res.json();

    const dot  = document.getElementById('statusDot');
    const txt  = document.getElementById('statusText');

    if (data.status === 'training') {
      dot.className = 'dot training';
      txt.textContent = 'TRAINING IN PROGRESS…';
    } else if (data.status === 'ready') {
      dot.className = 'dot ready';
      txt.textContent = 'MODELS READY';
      updateAccuracyUI(data.lstm_accuracy, data.rnn_accuracy);
      document.getElementById('predictBtn').disabled = false;
      clearInterval(pollTimer);
    } else if (data.status === 'error') {
      dot.className = 'dot error';
      txt.textContent = 'TRAINING ERROR';
      showToast('Training error: ' + data.error, true);
      clearInterval(pollTimer);
    } else {
      dot.className = 'dot';
      txt.textContent = 'AWAITING DATASET';
    }
  } catch (e) {
    document.getElementById('statusDot').className = 'dot error';
    document.getElementById('statusText').textContent = 'BACKEND OFFLINE';
  }
}

function updateAccuracyUI(lstm, rnn) {
  if (lstm !== null) {
    document.getElementById('lstmAccVal').textContent = lstm.toFixed(2) + '%';
    setTimeout(() => {
      document.getElementById('lstmBar').style.width = lstm + '%';
    }, 100);
  }
  if (rnn !== null) {
    document.getElementById('rnnAccVal').textContent = rnn.toFixed(2) + '%';
    setTimeout(() => {
      document.getElementById('rnnBar').style.width = rnn + '%';
    }, 100);
  }
}

async function predict() {
  const fields = ['temperature','humidity','pressure','wind_speed',
                  'precipitation','cloud_cover','uv_index'];
  const payload = {};
  for (const f of fields) {
    const v = document.getElementById(f).value.trim();
    if (v === '') { showToast('Please fill all fields.', true); return; }
    payload[f] = parseFloat(v);
  }

  const btn = document.getElementById('predictBtn');
  btn.classList.add('loading');
  btn.disabled = true;

  try {
    const res  = await fetch(`${API}/predict`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });

    if (!res.ok) {
      const err = await res.json();
      showToast(err.error || 'Prediction failed.', true);
      return;
    }

    const data = await res.json();

    const lstmLabel = document.getElementById('lstmLabel');
    lstmLabel.textContent = data.lstm.label;
    lstmLabel.className = 'result-category ' + riskClass(data.lstm.label);
    document.getElementById('lstmConf').textContent = data.lstm.confidence + '%';
    document.getElementById('lstmAccOut').textContent = data.lstm_accuracy + '%';
    document.getElementById('lstmCard').classList.add('active');

    
    document.getElementById('lstmBest').classList.toggle('show', data.best_model === 'LSTM');
   

    showToast('Prediction complete — ' + data.best_model + ' selected as best model.');

  } catch (e) {
    showToast('Cannot reach backend. Is app.py running?', true);
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

document.getElementById('predictBtn').disabled = true;
checkStatus();
pollTimer = setInterval(checkStatus, 3000);
</script>
</body>
</html>
